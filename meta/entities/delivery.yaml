# entity-delivery.yaml — 交付中心相关实体
# 分类: 交付项目、文档模板、标准方案库
# 版本: 1.0 | 创建: 2026-06-12 | 条目数: 17

entities:

  - id: baisheng-delivery-methodology
    name: 百胜价值交付方法论（Baisheng Value Delivery Methodology）
    level: 1
    type: methodology
    description: "百胜软件的价值交付方法论 V3.0，定义标准化交付流程和文档体系"
    source: wiki/entities/baisheng-delivery-methodology.md
    relations:
      - target: delivery-document-templates
        type: uses
      - target: blueprint-standard-library
        type: uses

  - id: delivery-document-templates
    name: 交付中心文档模板库（Delivery Document Templates）
    level: 1
    type: template
    description: "交付中心的标准化文档模板集合，包含调研大纲、业务调研报告、蓝图大纲等模板"
    source: wiki/entities/delivery-document-templates.md
    relations:
      - target: baisheng-delivery-methodology
        type: depends_on
      - target: blueprint-standard-library
        type: related_to
      - target: sit-test-case-library
        type: related_to

  - id: blueprint-standard-library
    name: 电商领域项目蓝图大纲标准方案库（Blueprint Standard Library）
    level: 1
    type: library
    description: "电商领域项目蓝图大纲的标准方案库，覆盖6大分类（主数据/库存/电商订单/全渠道/财务对账等），四级树形结构"
    source: wiki/entities/blueprint-standard-library.md
    relations:
      - target: baisheng-delivery-methodology
        type: depends_on
      - target: sit-test-case-library
        type: related_to

  - id: sit-test-case-library
    name: SIT 测试用例标准方案库（SIT Test Case Standard Library）
    level: 1
    type: library
    description: "SIT 测试用例的标准方案库，7 Sheet ~50 个用例，覆盖5大业务模块 × 7种测试角色 × 8个操作系统"
    source: wiki/entities/sit-test-case-library.md
    relations:
      - target: blueprint-standard-library
        type: related_to
      - target: baisheng-delivery-methodology
        type: depends_on

  - id: datamax
    name: DataMax
    level: 1
    type: product
    description: "百胜软件的大数据平台产品，提供业务数据分析和报表能力"
    source: wiki/entities/datamax.md
    relations:
      - target: baisheng-delivery-methodology
        type: related_to

