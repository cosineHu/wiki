# scenarios.yaml — 场景驱动的组装规则
# 每个场景对应一个真实的 "How 类" 问题
# 核心字段: trigger / goal / composition / related_scenarios
# 版本: 1.0 | 创建: 2026-06-08 | 条目数: 20

scenarios:

  - id: ingest-article-to-wiki
    name: 将文章摄入知识库
    trigger: "用户发送文章链接或文档，回复'加入wiki'"
    goal: "将外部来源完整摄入知识库：保存原始资料、萃取知识、更新索引、Git 提交"
    composition:
      - phase: 1
        name: 同步与准备
        concepts: ["git-sync"]
        entities: ["git", "github"]
        rule: "先 git pull 拉取最新版本；失败时 git stash → pull → stash pop"
      - phase: 2
        name: 原始资料保存
        concepts: ["knowledge-extraction"]
        entities: ["llm-wiki", "raw-layer"]
        rule: "保存到 raw/articles/，添加 frontmatter（source_url/ingested/sha256）"
      - phase: 3
        name: 知识萃取
        concepts: ["knowledge-extraction", "metadata-annotation"]
        entities: ["llm-wiki", "obsidian"]
        rule: "从原文提取实体和概念，区分'方法/动作'与'人事物/名词'"
      - phase: 4
        name: 增量更新
        concepts: ["incremental-update", "cross-referencing"]
        entities: ["llm-wiki", "obsidian-bidirectional-links"]
        rule: "检查已有页面，追加而非覆盖；矛盾时标注 contested"
      - phase: 5
        name: 索引与日志
        concepts: ["knowledge-structuring"]
        entities: ["llm-wiki"]
        rule: "更新 index.md 和 log.md，确保每个页面有至少 2 个出链"
      - phase: 6
        name: 版本提交
        concepts: ["version-control"]
        entities: ["git", "github", "git-post-commit-hook"]
        rule: "git add -A && git commit；post-commit hook 自动 push"
      - phase: 7
        name: 反向校验
        concepts: ["yaml-reverse-check"]
        entities: ["meta-meta-layer"]
        rule: "检查是否有新概念/实体/场景/关系需要补充到 meta/"
    related_scenarios:
      - query-wiki-knowledge
      - wiki-health-check

  - id: query-wiki-knowledge
    name: 基于知识库回答问题
    trigger: "用户询问知识库覆盖范围内的问题"
    goal: "从知识库中检索相关知识，组装成结构化回答"
    composition:
      - phase: 1
        name: 场景匹配
        concepts: ["scene-matching"]
        entities: ["meta-scenario-layer"]
        rule: "根据问题匹配最合适的场景，确定组装规则"
      - phase: 2
        name: 知识检索
        concepts: ["information-retrieval"]
        entities: ["llm-wiki", "obsidian-dataview"]
        rule: "先读 index.md 定位分类，再用 search_files 全文检索"
      - phase: 3
        name: 知识组装
        concepts: ["knowledge-assembly"]
        entities: ["meta-concept-layer", "meta-entity-layer"]
        rule: "按场景 composition 规则编排概念和实体"
      - phase: 4
        name: 原文深挖
        concepts: ["source-deep-dive"]
        entities: ["llm-wiki", "wiki-raw-layer"]
        rule: "必要时回溯原始文章获取具体案例和数据"
      - phase: 5
        name: 结构化输出
        concepts: ["structured-writing"]
        entities: ["obsidian"]
        rule: "按框架组织回答，标注来源引用"
      - phase: 6
        name: 反向校验
        concepts: ["yaml-reverse-check"]
        entities: ["meta-meta-layer"]
        rule: "检查回答过程中是否发现了知识库的缺口"
    related_scenarios:
      - ingest-article-to-wiki
      - write-article-from-kb

  - id: write-article-from-kb
    name: 基于知识库撰写文章
    trigger: "需要基于知识库素材撰写新文章（如 CSDN 系列）"
    goal: "从知识库选题、组装素材、结构化写作、反向校验"
    composition:
      - phase: 1
        name: 输入解析
        concepts: ["scene-matching", "task-decomposition"]
        entities: ["meta-scenario-layer"]
        rule: "解析写作需求，确定主题、受众、篇幅"
      - phase: 2
        name: 概念匹配
        concepts: ["information-retrieval", "knowledge-assembly"]
        entities: ["meta-concept-layer"]
        rule: "匹配相关的原子概念和组合概念"
      - phase: 3
        name: 问题分解
        concepts: ["task-decomposition", "mece-decomposition"]
        entities: []
        rule: "将文章主题按 MECE 原则分解为章节/段落"
      - phase: 4
        name: 框架冻结
        concepts: ["abstract-modeling"]
        entities: []
        rule: "确定文章框架（总分总/问题-分析-方案/是什么-为什么-怎么办），冻结不再变动"
      - phase: 5
        name: 原文深挖
        concepts: ["source-deep-dive"]
        entities: ["llm-wiki", "wiki-raw-layer"]
        rule: "回溯原始文章获取具体案例、数据、引用"
      - phase: 6
        name: 结构化写作
        concepts: ["structured-writing"]
        entities: ["obsidian", "markdown"]
        rule: "按框架逐段写作，每个论点附案例支撑"
      - phase: 7
        name: 自检输出
        concepts: ["yaml-reverse-check", "cross-referencing"]
        entities: ["meta-meta-layer"]
        rule: "检查：框架完整？逻辑自洽？有案例支撑？发现新概念/实体？"
    related_scenarios:
      - query-wiki-knowledge
      - personal-methodology-extraction

  - id: wiki-health-check
    name: 知识库健康检查
    trigger: "定期（每日/每周）或用户主动触发"
    goal: "检查知识库的结构完整性、一致性和时效性"
    composition:
      - phase: 1
        name: 全量扫描
        concepts: ["information-retrieval"]
        entities: ["llm-wiki"]
        rule: "扫描所有页面，建立完整清单"
      - phase: 2
        name: 孤立页面检查
        concepts: ["cross-referencing"]
        entities: ["obsidian-bidirectional-links"]
        rule: "找出无入链的孤立页面，建议补充链接或归档"
      - phase: 3
        name: 死链检查
        concepts: ["cross-referencing"]
        entities: ["obsidian-bidirectional-links"]
        rule: "找出指向不存在页面的 [[wikilinks]]"
      - phase: 4
        name: 元数据验证
        concepts: ["metadata-annotation"]
        entities: ["yaml-frontmatter", "obsidian-dataview"]
        rule: "验证 frontmatter 完整性、标签一致性"
      - phase: 5
        name: 时效性检查
        concepts: ["comparative-analysis"]
        entities: ["llm-wiki"]
        rule: "对比页面更新日期与来源日期，标记超过 90 天未更新的页面"
      - phase: 6
        name: 元模型校验
        concepts: ["yaml-reverse-check"]
        entities: ["meta-meta-layer"]
        rule: "检查 meta/ 是否覆盖了 wiki/ 中的所有概念和实体"
      - phase: 7
        name: 报告生成
        concepts: ["structured-writing"]
        entities: ["obsidian"]
        rule: "按严重程度分组输出报告：死链 > 孤立 > 过时 > 元数据缺失"
    related_scenarios:
      - knowledge-evolution-cycle
      - cron-job-health-monitor

  - id: knowledge-evolution-cycle
    name: 知识进化循环
    trigger: "每次知识库被使用后自动触发，或定时触发"
    goal: "让知识库在使用中持续生长：发现缺口 → 补充 → 验证"
    composition:
      - phase: 1
        name: 使用记录
        concepts: ["memory-writing"]
        entities: ["hermes-memory-system"]
        rule: "记录本次知识库使用的场景和结果"
      - phase: 2
        name: 缺口发现
        concepts: ["yaml-reverse-check"]
        entities: ["meta-meta-layer"]
        rule: "检查 5 个维度：新场景？新概念？新实体？新关系？死链？"
      - phase: 3
        name: 骨架生成
        concepts: ["knowledge-structuring"]
        entities: ["meta-meta-layer"]
        rule: "将发现转化为 yaml 条目骨架，待人工审核"
      - phase: 4
        name: 增量合入
        concepts: ["incremental-update"]
        entities: ["meta-meta-layer"]
        rule: "人工审核后合入主库，更新相关交叉引用"
      - phase: 5
        name: 效果验证
        concepts: ["feedback-loop"]
        entities: []
        rule: "下次使用时验证：缺口是否被填补？组装是否更顺畅？"
    related_scenarios:
      - wiki-health-check
      - personal-methodology-extraction

  - id: personal-methodology-extraction
    name: 个人方法论萃取
    trigger: "积累了足够多的个人文章和经验，需要系统化提炼"
    goal: "从个人文章中系统性地提取方法论，结构化为原子+组合双层架构"
    composition:
      - phase: 1
        name: 素材收集
        concepts: ["information-retrieval"]
        entities: ["llm-wiki", "wiki-raw-layer"]
        rule: "从 raw/ 和 concepts/ 中收集所有个人文章和方法论片段"
      - phase: 2
        name: 模式识别
        concepts: ["inductive-reasoning"]
        entities: []
        rule: "从多个片段中归纳出通用的方法模式"
      - phase: 3
        name: 概念实体分离
        concepts: ["mece-decomposition"]
        entities: []
        rule: "区分'方法/动作'（概念）和'人事物/名词'（实体）"
      - phase: 4
        name: IPO 建模
        concepts: ["abstract-modeling"]
        entities: ["ipo-model"]
        rule: "为每个原子概念建模：Input → Process → Output → Tools"
      - phase: 5
        name: 组合分解
        concepts: ["task-decomposition"]
        entities: ["meta-concept-layer"]
        rule: "为每个组合概念定义 decomposition，每步引用原子概念"
      - phase: 6
        name: 反向校验
        concepts: ["yaml-reverse-check"]
        entities: ["meta-meta-layer"]
        rule: "检查是否有遗漏的方法论，颗粒度是否一致"
    related_scenarios:
      - knowledge-evolution-cycle
      - write-article-from-kb

  - id: hermes-skill-development
    name: Hermes 技能开发
    trigger: "发现可复用的工作流程，需要注册为 Hermes 技能"
    goal: "将经过验证的工作流程注册为可被 AI Agent 调用的技能"
    composition:
      - phase: 1
        name: 流程验证
        concepts: ["task-decomposition"]
        entities: ["hermes-agent"]
        rule: "确认工作流程已经过多次验证，步骤稳定"
      - phase: 2
        name: 技能定义
        concepts: ["skill-registration"]
        entities: ["skill-md", "hermes-skills-system"]
        rule: "编写 SKILL.md：触发条件、步骤、命令、pitfalls"
      - phase: 3
        name: 元数据标注
        concepts: ["metadata-annotation"]
        entities: ["yaml-frontmatter"]
        rule: "添加 frontmatter：name/description/version/platforms/tags"
      - phase: 4
        name: 交叉引用
        concepts: ["cross-referencing"]
        entities: ["meta-meta-layer"]
        rule: "在 meta/ 中注册该技能对应的概念和实体"
      - phase: 5
        name: 测试验证
        concepts: ["feedback-loop"]
        entities: ["hermes-agent"]
        rule: "加载技能并测试是否可正常执行"
    related_scenarios:
      - hermes-config-optimization
      - multi-agent-orchestration

  - id: hermes-config-optimization
    name: Hermes 配置优化
    trigger: "Hermes 性能不佳、需要适配新场景、或升级后需要调整"
    goal: "系统性地优化 Hermes Agent 的配置（模型/工具/记忆/技能）"
    composition:
      - phase: 1
        name: 现状诊断
        concepts: ["information-retrieval"]
        entities: ["hermes-agent"]
        rule: "检查当前配置：模型、工具集、记忆系统、技能列表"
      - phase: 2
        name: 需求分析
        concepts: ["task-decomposition"]
        entities: []
        rule: "明确优化目标：速度？质量？成本？功能？"
      - phase: 3
        name: 方案对比
        concepts: ["comparative-analysis"]
        entities: []
        rule: "对比不同配置方案的优劣，考虑 trade-off"
      - phase: 4
        name: 逐步实施
        concepts: ["incremental-update"]
        entities: ["hermes-agent"]
        rule: "每次只改一个变量，验证后再改下一个"
      - phase: 5
        name: 效果验证
        concepts: ["feedback-loop"]
        entities: ["hermes-agent"]
        rule: "对比优化前后的性能指标"
    related_scenarios:
      - hermes-skill-development
      - technical-troubleshooting

  - id: multi-agent-orchestration
    name: 多 Agent 编排
    trigger: "任务可并行分解且各子任务独立"
    goal: "编排多个 AI Agent 并行或串行完成复杂任务"
    composition:
      - phase: 1
        name: 任务分析
        concepts: ["task-decomposition", "mece-decomposition"]
        entities: []
        rule: "分析任务是否可并行分解，识别子任务间的依赖关系"
      - phase: 2
        name: Agent 分配
        concepts: ["delegation"]
        entities: ["hermes-agent", "subagent"]
        rule: "为每个子任务分配合适的 Agent（leaf/orchestrator）"
      - phase: 3
        name: 上下文隔离
        concepts: ["session-isolation", "context-management"]
        entities: ["hermes-session-isolation"]
        rule: "确保各 Agent 的上下文互不污染，通过 context 字段传递必要信息"
      - phase: 4
        name: 并行执行
        concepts: ["tool-calling"]
        entities: ["hermes-agent"]
        rule: "并行启动所有子 Agent，监控执行状态"
      - phase: 5
        name: 结果汇总
        concepts: ["knowledge-assembly"]
        entities: []
        rule: "汇总各 Agent 结果，验证一致性，编排为最终输出"
      - phase: 6
        name: 经验沉淀
        concepts: ["memory-writing", "skill-registration"]
        entities: ["hermes-memory-system", "hermes-skills-system"]
        rule: "如果编排模式可复用，注册为技能"
    related_scenarios:
      - hermes-skill-development
      - technical-troubleshooting

  - id: technical-troubleshooting
    name: 技术故障排查
    trigger: "遇到技术故障或异常行为（如 Git push 超时、服务不可用）"
    goal: "系统性地排查和解决技术问题，记录解决方案防止复发"
    composition:
      - phase: 1
        name: 问题定位
        concepts: ["task-decomposition"]
        entities: []
        rule: "明确问题现象、影响范围、复现条件"
      - phase: 2
        name: 根因分析
        concepts: ["causal-chain-analysis", "first-principles"]
        entities: ["five-whys"]
        rule: "逐层追问为什么，追溯根本原因"
      - phase: 3
        name: 方案设计
        concepts: ["comparative-analysis"]
        entities: []
        rule: "对比多种解决方案，选择最优（考虑可行性、副作用、成本）"
      - phase: 4
        name: 实施验证
        concepts: ["feedback-loop"]
        entities: []
        rule: "实施解决方案，验证问题是否解决"
      - phase: 5
        name: 知识沉淀
        concepts: ["memory-writing", "skill-registration"]
        entities: ["hermes-memory-system", "meta-meta-layer"]
        rule: "将问题和解决方案记录到记忆系统和知识库"
    related_scenarios:
      - hermes-config-optimization
      - wiki-health-check

  - id: second-brain-daily-routine
    name: 第二大脑日常维护
    trigger: "每日定时触发"
    goal: "第二大脑系统的日常同步、整理和进化"
    composition:
      - phase: 1
        name: Git 同步
        concepts: ["git-sync"]
        entities: ["git", "github"]
        rule: "git pull 拉取最新版本"
      - phase: 2
        name: 记忆回顾
        concepts: ["memory-retrieval"]
        entities: ["hermes-memory-system"]
        rule: "回顾最近的记忆和会话，提取可沉淀的知识"
      - phase: 3
        name: 碎片整理
        concepts: ["information-retrieval", "knowledge-structuring"]
        entities: ["llm-wiki"]
        rule: "检查是否有待处理的知识碎片（未分类、未链接的页面）"
      - phase: 4
        name: 增量更新
        concepts: ["incremental-update"]
        entities: ["llm-wiki"]
        rule: "将新发现整合到知识库"
      - phase: 5
        name: 健康检查
        concepts: ["yaml-reverse-check"]
        entities: ["meta-meta-layer"]
        rule: "快速健康检查：孤立页面、死链、过期内容"
      - phase: 6
        name: 版本提交
        concepts: ["version-control"]
        entities: ["git", "github"]
        rule: "如有变更，提交并推送"
    related_scenarios:
      - wiki-health-check
      - knowledge-evolution-cycle

  - id: cron-job-setup
    name: 定时任务设置
    trigger: "需要为知识库设置自动化维护任务"
    goal: "设计和部署知识库的自动化定时任务"
    composition:
      - phase: 1
        name: 需求分析
        concepts: ["task-decomposition"]
        entities: []
        rule: "分析哪些知识管理任务适合自动化（同步/检查/进化）"
      - phase: 2
        name: 任务设计
        concepts: ["cron-job-scheduling"]
        entities: ["hermes-cron"]
        rule: "为每个任务定义调度策略、prompt、交付目标"
      - phase: 3
        name: 依赖配置
        concepts: ["cross-referencing"]
        entities: []
        rule: "如果任务间有依赖（如先同步再检查），配置 context_from"
      - phase: 4
        name: 部署验证
        concepts: ["feedback-loop"]
        entities: ["hermes-cron"]
        rule: "部署后手动触发一次，验证输出是否符合预期"
      - phase: 5
        name: 监控设计
        concepts: ["cron-job-health-monitor"]
        entities: []
        rule: "设计监控机制：如何知道任务失败？如何告警？"
    related_scenarios:
      - second-brain-daily-routine
      - cron-job-health-monitor

  - id: cron-job-health-monitor
    name: 定时任务健康监控
    trigger: "定时任务执行后或出现异常时"
    goal: "监控定时任务的执行状态和输出质量"
    composition:
      - phase: 1
        name: 日志收集
        concepts: ["information-retrieval"]
        entities: ["hermes-cron"]
        rule: "获取定时任务的执行日志和输出"
      - phase: 2
        name: 异常检测
        concepts: ["comparative-analysis"]
        entities: []
        rule: "对比预期输出与实际输出，识别异常"
      - phase: 3
        name: 根因分析
        concepts: ["causal-chain-analysis"]
        entities: []
        rule: "分析异常的根本原因"
      - phase: 4
        name: 自动修复
        concepts: ["incremental-update"]
        entities: []
        rule: "如果异常可自动修复（如 Git 冲突），自动处理"
      - phase: 5
        name: 告警上报
        concepts: ["multi-platform-delivery"]
        entities: ["feishu-bot"]
        rule: "无法自动修复的问题，通过飞书通知用户"
    related_scenarios:
      - cron-job-setup
      - technical-troubleshooting

  - id: new-domain-exploration
    name: 新领域探索
    trigger: "需要快速了解一个全新领域"
    goal: "快速建立对新领域的结构化认知，并沉淀到知识库"
    composition:
      - phase: 1
        name: 信息收集
        concepts: ["information-retrieval"]
        entities: []
        rule: "搜索领域核心概念、关键人物、重要论文/文章"
      - phase: 2
        name: 概念建模
        concepts: ["abstract-modeling"]
        entities: []
        rule: "构建领域的简化概念模型（核心要素+关系）"
      - phase: 3
        name: 结构分解
        concepts: ["mece-decomposition"]
        entities: []
        rule: "按 MECE 原则拆解领域的知识结构"
      - phase: 4
        name: 对比锚定
        concepts: ["comparative-analysis"]
        entities: []
        rule: "与已知领域对比，加速理解（'这个领域的 X 相当于那个领域的 Y'）"
      - phase: 5
        name: 知识沉淀
        concepts: ["knowledge-structuring", "cross-referencing"]
        entities: ["llm-wiki", "obsidian"]
        rule: "将新领域知识结构化存入知识库，建立与已有知识的链接"
    related_scenarios:
      - query-wiki-knowledge
      - personal-methodology-extraction

  - id: decision-analysis
    name: 决策分析
    trigger: "面临重要决策或选择"
    goal: "系统性地分析决策问题，给出有理有据的建议"
    composition:
      - phase: 1
        name: 问题框定
        concepts: ["task-decomposition", "first-principles"]
        entities: []
        rule: "明确决策的边界、约束和本质目标"
      - phase: 2
        name: 选项枚举
        concepts: ["mece-decomposition"]
        entities: []
        rule: "枚举所有可行选项，确保 MECE"
      - phase: 3
        name: 多维对比
        concepts: ["comparative-analysis"]
        entities: ["swot-analysis"]
        rule: "多维度对比各选项（可行性/成本/风险/长期价值）"
      - phase: 4
        name: 后果推演
        concepts: ["causal-chain-analysis", "second-order-thinking"]
        entities: []
        rule: "推演各选项的一阶和二阶后果"
      - phase: 5
        name: 决策记录
        concepts: ["retrospective-summary"]
        entities: ["obsidian"]
        rule: "记录决策逻辑和假设，供未来复盘验证"
    related_scenarios:
      - technical-troubleshooting
      - system-architecture-design

  - id: system-architecture-design
    name: 系统架构设计
    trigger: "需要设计新系统或重构现有系统"
    goal: "从需求到架构方案的系统性设计"
    composition:
      - phase: 1
        name: 需求分解
        concepts: ["task-decomposition", "first-principles"]
        entities: []
        rule: "分解需求，识别核心问题和约束，回归设计的第一性原理"
      - phase: 2
        name: 概念建模
        concepts: ["abstract-modeling"]
        entities: ["architecture-diagram"]
        rule: "构建系统的概念架构模型（层次/组件/接口）"
      - phase: 3
        name: 方案对比
        concepts: ["comparative-analysis"]
        entities: []
        rule: "对比备选架构方案，选择最优"
      - phase: 4
        name: 系统验证
        concepts: ["system-thinking"]
        entities: []
        rule: "验证架构的系统性影响：反馈回路、瓶颈、单点故障"
      - phase: 5
        name: 设计记录
        concepts: ["knowledge-structuring"]
        entities: ["obsidian", "llm-wiki"]
        rule: "记录设计决策和 trade-off，纳入知识库"
    related_scenarios:
      - decision-analysis
      - new-domain-exploration

  - id: learning-retrospective
    name: 学习复盘
    trigger: "完成一个学习周期或项目后"
    goal: "结构化回顾学习/项目过程，提取可复用的经验"
    composition:
      - phase: 1
        name: 目标回顾
        concepts: ["retrospective-summary"]
        entities: []
        rule: "回顾最初的目标和预期"
      - phase: 2
        name: 结果评估
        concepts: ["comparative-analysis"]
        entities: []
        rule: "对比实际结果与目标的差距"
      - phase: 3
        name: 过程分析
        concepts: ["causal-chain-analysis"]
        entities: []
        rule: "分析成功/失败的关键因素和因果链"
      - phase: 4
        name: 规律提取
        concepts: ["inductive-reasoning"]
        entities: []
        rule: "从具体经验中抽象出可复用的规律"
      - phase: 5
        name: 知识沉淀
        concepts: ["knowledge-structuring", "memory-writing"]
        entities: ["llm-wiki", "hermes-memory-system"]
        rule: "将经验教训写入知识库和记忆系统"
    related_scenarios:
      - personal-methodology-extraction
      - knowledge-evolution-cycle

  - id: content-publishing
    name: 内容发布
    trigger: "需要将知识库中的内容发布到外部平台（CSDN/公众号等）"
    goal: "从知识库提取内容，适配目标平台格式后发布"
    composition:
      - phase: 1
        name: 选题匹配
        concepts: ["scene-matching", "information-retrieval"]
        entities: ["meta-scenario-layer"]
        rule: "从知识库中匹配合适的选题和素材"
      - phase: 2
        name: 内容组装
        concepts: ["knowledge-assembly"]
        entities: ["meta-concept-layer"]
        rule: "按文章写作场景组装素材"
      - phase: 3
        name: 平台适配
        concepts: ["multi-platform-delivery"]
        entities: ["csdn", "feishu"]
        rule: "根据目标平台调整格式、长度、风格"
      - phase: 4
        name: 质量检查
        concepts: ["yaml-reverse-check"]
        entities: []
        rule: "检查：逻辑自洽？引用准确？有新发现？"
      - phase: 5
        name: 发布追踪
        concepts: ["memory-writing"]
        entities: ["hermes-memory-system"]
        rule: "记录发布时间和链接，追踪反馈"
    related_scenarios:
      - write-article-from-kb
      - knowledge-evolution-cycle

  - id: cross-platform-sync
    name: 跨平台同步
    trigger: "需要在多个平台/设备间同步知识库"
    goal: "确保知识库在服务器、本地 Obsidian、GitHub 之间保持一致"
    composition:
      - phase: 1
        name: 状态检查
        concepts: ["information-retrieval"]
        entities: ["git"]
        rule: "检查各端的知识库版本状态"
      - phase: 2
        name: 冲突检测
        concepts: ["comparative-analysis"]
        entities: ["git"]
        rule: "检测是否存在冲突（同一文件被多端修改）"
      - phase: 3
        name: 冲突解决
        concepts: ["incremental-update"]
        entities: ["git"]
        rule: "解决冲突：日志类文件保留双方，内容类文件人工判断"
      - phase: 4
        name: 同步执行
        concepts: ["git-sync"]
        entities: ["git", "github"]
        rule: "执行 pull → 解决冲突 → commit → push"
      - phase: 5
        name: 一致性验证
        concepts: ["feedback-loop"]
        entities: []
        rule: "验证各端内容一致"
    related_scenarios:
      - second-brain-daily-routine
      - technical-troubleshooting

  - id: knowledge-gap-analysis
    name: 知识缺口分析
    trigger: "定期或用户主动触发，检查知识库的覆盖盲区"
    goal: "识别知识库中缺失的概念、实体和关系，指导后续摄入方向"
    composition:
      - phase: 1
        name: 覆盖扫描
        concepts: ["information-retrieval"]
        entities: ["meta-meta-layer", "llm-wiki"]
        rule: "对比 wiki/ 中的内容与 meta/ 中的元模型覆盖"
      - phase: 2
        name: 缺口识别
        concepts: ["comparative-analysis", "yaml-reverse-check"]
        entities: []
        rule: "识别：wiki/ 中有但 meta/ 中未建模的概念/实体"
      - phase: 3
        name: 优先级排序
        concepts: ["task-decomposition"]
        entities: []
        rule: "按重要性排序：核心概念 > 高频实体 > 边缘知识"
      - phase: 4
        name: 补充计划
        concepts: ["knowledge-structuring"]
        entities: []
        rule: "制定补充计划：哪些需要新建？哪些可以合并？"
      - phase: 5
        name: 执行追踪
        concepts: ["feedback-loop"]
        entities: []
        rule: "追踪补充进度，定期复查"
    related_scenarios:
      - wiki-health-check
      - knowledge-evolution-cycle
